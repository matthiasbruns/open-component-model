name: Test Bindings

# Reusable workflow — runs unit and integration tests for a given set of
# binding modules. Called by ci.yml (after module discovery) and by
# release-bindings.yaml (after the plan step).

on:
  workflow_call:
    inputs:
      unit_modules_json:
        description: "JSON array of binding paths to unit-test (one runner per module)."
        type: string
        required: false
        default: '[]'
      integration_modules_json:
        description: "JSON array of integration sub-module paths to test."
        type: string
        required: false
        default: '[]'
    outputs:
      unit_result:
        description: "Result of the unit test matrix ('success', 'failure', 'skipped')"
        value: ${{ jobs.unit.result }}
      integration_result:
        description: "Result of the integration test matrix ('success', 'failure', 'skipped')"
        value: ${{ jobs.integration.result }}

permissions:
  contents: read

jobs:
  unit:
    name: "Unit / ${{ matrix.module }}"
    if: ${{ inputs.unit_modules_json && inputs.unit_modules_json != '[]' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(inputs.unit_modules_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: .go-version
          cache-dependency-path: '${{ github.workspace }}/${{ matrix.module }}/go.sum'

      - name: Init workspace
        run: task init/go.work

      - name: Run unit tests
        run: task ${{ matrix.module }}:test

  integration:
    name: "Integration / ${{ matrix.module }}"
    if: ${{ inputs.integration_modules_json && inputs.integration_modules_json != '[]' }}
    # Runner override — sigstore integration tests require x86 for tooling compatibility.
    runs-on: ${{ fromJSON('{"bindings/go/sigstore/integration":"ubuntu-latest"}')[matrix.module] || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        module: ${{ fromJSON(inputs.integration_modules_json) }}
    env:
      TESTCONTAINER_DOCKER_NETWORK: integration-testcontainers
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: .go-version
          cache-dependency-path: '${{ github.workspace }}/${{ matrix.module }}/go.sum'

      - name: Init workspace
        run: task init/go.work

      - name: Create Docker network for Testcontainers
        run: docker network create ${{ env.TESTCONTAINER_DOCKER_NETWORK }}

      - name: Run integration tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.actor }}
          MODULE: ${{ matrix.module }}
        run: task "${MODULE}:test/integration"
