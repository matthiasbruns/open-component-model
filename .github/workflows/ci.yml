name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '**/*.md'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  discover_modules:
    name: "Discover Go Modules"
    runs-on: ubuntu-24.04-arm
    outputs:
      modules_json:              ${{ steps.discover.outputs.modules_json }}
      affected_modules_json:     ${{ steps.discover.outputs.affected_modules_json }}
      affected_unit_json:        ${{ steps.discover.outputs.affected_unit_json }}
      affected_integration_json: ${{ steps.discover.outputs.affected_integration_json }}
      affected_lint_json:        ${{ steps.discover.outputs.affected_lint_json }}
    steps:
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0        # needed for git diff origin/<base>...HEAD
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: .go-version
          cache: false
      - name: Init workspace
        run: task init/go.work
      - name: Discover modules and compute affected set
        id: discover
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { discoverModules } = await import('${{ github.workspace }}/.github/scripts/discover-modules.js');
            await discoverModules({ core });

  golangci_lint:
    name: "golangci-lint / ${{ matrix.module }}"
    needs: discover_modules
    if: ${{ needs.discover_modules.outputs.affected_lint_json != '[]' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      checks: write
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover_modules.outputs.affected_lint_json) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: .go-version
      - name: Read tool versions
        id: versions
        run: |
          source .env
          echo "golangci_lint=${GOLANGCI_LINT_VERSION}" >> $GITHUB_OUTPUT
      - name: golangci-lint ${{ matrix.module }}
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          verify: 'false'  # config is verified once globally, not per module
          version: ${{ steps.versions.outputs.golangci_lint }}
          working-directory: ${{ github.workspace }}/${{ matrix.module }}
          args: --timeout 10m --config=${{ github.workspace }}/golangci.yml

  run_tests:
    name: "Tests"
    needs: discover_modules
    uses: ./.github/workflows/test-bindings.yaml
    with:
      unit_modules_json:         ${{ needs.discover_modules.outputs.affected_unit_json }}
      integration_modules_json:  ${{ needs.discover_modules.outputs.affected_integration_json }}

  generate:
    runs-on: ubuntu-24.04-arm
    name: "Code Generation"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Go (required by some generators)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: .go-version
          cache-dependency-path: |
            ${{ github.workspace }}/bindings/go/generator/go.sum
      - name: Run Code Generation
        run: task generate
      - name: Ensure Clean Target Repository
        run: |
          gitStatus="$(git status --porcelain)"
          if [[ -z "${gitStatus}" ]]; then
              exit 0
          fi
          echo "${gitStatus}"
          exit 1

  # failure aggregation job
  # Our CI matrix is dynamic so it cannot be used for required status checks in github.
  # However we can add a failure step that can get triggered if any dependency fails or is cancelled.
  # If this is the case, this job will fail. If CI is successful, the CI Completion Check will be skipped.
  # see https://github.com/orgs/community/discussions/60792 for details on why this is needed
  check-completion:
    name: "Completion"
    runs-on: ubuntu-24.04-arm
    needs:
      - generate
      - run_tests
      - golangci_lint
    if: ${{ failure() }}
    steps:
      - name: Some CI step failed or was cancelled!
        run: exit 1
