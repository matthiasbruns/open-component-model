name: Release Go Submodule

on:
  workflow_dispatch:
    inputs:
      path:
        description: "Relative path to the Go submodule (e.g., module-a)"
        required: true
        type: string
      bump:
        description: "Bump Mode (major, minor, patch, none)"
        required: false
        type: string
        default: "patch"
        options: [patch, minor, major, none]
      suffix:
        description: "optional suffix for the tag (e.g. alpha1 can lead to v0.0.0-alpha1)"
        required: false
        type: string
      dry_run:
        description: "Perform a dry run without pushing tags"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-24.04-arm
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      changelog_b64: ${{ steps.changelog.outputs.changelog_b64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Validate path exists
        env:
          INPUT_PATH: ${{ github.event.inputs.path }}
        run: |
          if [ ! -f "${INPUT_PATH}/go.mod" ]; then
            echo "No go.mod found in ${INPUT_PATH}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Compute next version
        id: version
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          MOD_PATH: ${{ github.event.inputs.path }}
          BUMP: ${{ github.event.inputs.bump }}
          SUFFIX: ${{ github.event.inputs.suffix }}
        with:
          script: |
            const { execFileSync } = await import('child_process');
            const { computeNextTag, latestTag } = await import('${{ github.workspace }}/.github/scripts/submodule-version.js');
            const modPath = process.env.MOD_PATH;

            const tag = computeNextTag(modPath, process.env.BUMP, { suffix: process.env.SUFFIX || '' });
            core.info(`Next tag: ${tag}`);
            core.setOutput('new_tag', tag);

            // Resolve the commit the current latest tag points at (changelog range start).
            const current = latestTag(modPath);
            const fromCommit = current
              ? execFileSync('git', ['rev-list', '-n', '1', current], { encoding: 'utf-8' }).trim()
              : execFileSync('git', ['rev-list', '--max-parents=0', 'HEAD'], { encoding: 'utf-8' }).trim();
            core.setOutput('from_commit', fromCommit);

      - name: Build changelog
        id: changelog
        env:
          FROM_COMMIT: ${{ steps.version.outputs.from_commit }}
          INPUT_PATH: ${{ github.event.inputs.path }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          from="${FROM_COMMIT}"
          to=HEAD
          path="${INPUT_PATH}"

          log=$(git log --pretty=format:"- %s (%h)" "$from".."$to" -- "$path" || true)

          if [ -z "$log" ]; then
            log="No changes"
          fi

          msg="Release ${NEW_TAG}"$'\n\n'"$log"

          encoded=$(printf "%s" "$msg" | base64 -w0)
          echo "changelog_b64=$encoded" >> "$GITHUB_OUTPUT"

      - name: Summarize
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          CHANGELOG_B64: ${{ steps.changelog.outputs.changelog_b64 }}
        run: |
          echo "## Dry run – would create tag:" >> "$GITHUB_STEP_SUMMARY"
          echo "${NEW_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Changelog" >> "$GITHUB_STEP_SUMMARY"
          echo "${CHANGELOG_B64}" | base64 -d >> "$GITHUB_STEP_SUMMARY"

  release:
    if: ${{ inputs.dry_run == false }}
    needs: version
    environment:
      name: go-modules
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.OCMBOT_APP_ID }}
          private-key: ${{ secrets.OCMBOT_PRIV_KEY }}
      - name: Setup git config
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and Push Tag
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          NEW_TAG: ${{ needs.version.outputs.new_tag }}
          CHANGELOG_B64: ${{ needs.version.outputs.changelog_b64 }}
        run: |
          tag="${NEW_TAG}"
          msg=$(echo "${CHANGELOG_B64}" | base64 -d)

          printf "%s\n" "$msg" > .tagmsg
          git tag -a "$tag" -F .tagmsg
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$tag"
